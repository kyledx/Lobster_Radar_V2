name: Lobster 2.0 Macro Radar

on:
  schedule:
    # 每 15 分钟执行一次 (GitHub Actions 免费版实际可能有几分钟排队延迟)
    - cron: '*/15 * * * *'
  workflow_dispatch: # 允许您在网页上手动点击按钮强制运行

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码 (Checkout Repo)
      uses: actions/checkout@v3

    - name: 配置 Python 环境 (Setup Python)
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 安装弹药库 (Install Dependencies)
      run: |
        python -m pip install --upgrade pip
        pip install openai feedparser

    - name: 🧠 启动大龙虾 2.0 (Run Lobster)
      env:
        # 从密码箱提取 OpenAI 钥匙
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python main.py

    - name: 💾 保存情报文件并推送到仓库 (Commit and Push)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add news_sentiment.json
        # 允许没有改动时不报错
        git commit -m "🤖 大龙虾情报更新: $(date -u)" || echo "No changes to commit"
        git push
